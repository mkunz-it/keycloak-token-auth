name: Compatibility Matrix

on:
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keycloak_version: [ 26.4.7, 26.5.4, latest, nightly ]
        extension_version: [ 26.5.0 ]
    name: Compatibility (KC ${{ matrix.keycloak_version }}, Extension ${{ matrix.extension_version }})
    steps:
      - uses: actions/checkout@v5
        with:
            ref: v${{ matrix.extension_version }}
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'
      - name: Clean and compile
        run: mvn -B -U clean test-compile --file pom.xml
      - name: Download extension
        run: curl -L -o target/keycloak-restrict-client-auth.jar https://github.com/mkunz-it/keycloak-id-token-auth/releases/download/v${{ matrix.extension_version }}/keycloak-id-token-auth.jar
      - name: Compatibility tests
        run: mvn -B -U failsafe:integration-test failsafe:verify --file pom.xml -Dkeycloak.version=${{ matrix.keycloak_version }} -DuseJar=true
